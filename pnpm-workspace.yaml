allowBuilds:
  '@compodoc/compodoc': true
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  less: true
  lmdb: true
  msgpackr-extract: true
  nx: true
  unrs-resolver: true
autoInstallPeers: true
packages:
  - 'apps/**'
  - 'libs/**'
  - 'tools/**'
  # exclude packages that are inside test directories
  - '!**/test/**'
