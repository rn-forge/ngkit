name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main
      - 'release/**'
  workflow_dispatch: # Enable manual trigger
    inputs:
      use-nx-cloud:
        description: 'Use Nx Cloud distributed CI (uncheck to validate locally, e.g. if Nx Cloud is having issues)'
        required: false
        type: boolean
        default: true

permissions:
  actions: read
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Default path: distributes lint/test/build/e2e across Nx Cloud agents (.nx/workflows/agents.yaml)
  # This job excludes playwright as they are managed by Nx Cloud agents
  ci-cloud:
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.use-nx-cloud) || (github.event_name != 'workflow_dispatch' && vars.USE_NX_CLOUD != 'false') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        name: Install pnpm
        with:
          run_install: false

      - run: pnpm dlx nx start-ci-run --distribute-on="3 rn-forge-ng" --stop-agents-after="lint,test,build,e2e-ci"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5

      - run: pnpm exec nx affected -t lint test build e2e-ci

      # Nx Cloud recommends fixes for failures to help you get CI green faster. Learn more: https://nx.dev/ci/features/self-healing-ci
      - run: pnpm exec nx fix-ci
        if: always()

  # Fallback path to run the pipeline on github runner when Nx Cloud is not available
  # Enable by setting repo variable USE_NX_CLOUD=false, or with "use-nx-cloud" unchecked when runnning manually
  ci-local:
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.use-nx-cloud == false) || (github.event_name != 'workflow_dispatch' && vars.USE_NX_CLOUD == 'false') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm exec playwright install --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
      - run: pnpm exec playwright install-deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5

      - run: pnpm exec nx affected -t lint test build e2e

  # Runs regardless of which path above executed - Sonar needs full (not
  # affected-only) coverage, so it regenerates lcov reports itself rather
  # than reusing whatever ci-cloud/ci-local happened to run.
  # Skipped for Dependabot PRs: GitHub sandboxes Dependabot-triggered runs
  # like fork PRs (read-only GITHUB_TOKEN, no Actions secrets), so SONAR_TOKEN
  # isn't available there - the next push to main still scans the merged code.
  sonarcloud:
    needs: [ci-cloud, ci-local]
    if: ${{ always() && github.actor != 'dependabot[bot]' && (needs.ci-cloud.result == 'success' || needs.ci-local.result == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # Sonar needs full history, not a shallow clone

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate coverage reports
        run: pnpm exec nx run-many -t test --projects=ng,ng-bootstrap

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Runs regardless of which path above executed - packaging isn't a
  # validation step, it just needs one of them to have succeeded first.
  package:
    needs: [ci-cloud, ci-local]
    if: ${{ always() && (needs.ci-cloud.result == 'success' || needs.ci-local.result == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Pack publishable tarballs
        run: pnpm exec nx run-many -t pack --projects=ng,ng-bootstrap

      - name: Upload package tarballs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-tarballs
          path: dist/tarballs/*.tgz
          retention-days: 14
