name: Pages

on:
  push:
    branches:
      - main
    paths:
      - 'libs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build Storybook
        run: pnpm exec nx build-storybook ng-bootstrap

      - name: Build Compodoc API docs
        run: |
          pnpm exec nx run ng:compodoc
          pnpm exec nx run ng-bootstrap:compodoc

      - name: Assemble site
        run: |
          mkdir -p dist/site/api/ng dist/site/api/ng-bootstrap
          cp -r dist/storybook/ng-bootstrap dist/site/storybook
          cp -r dist/compodoc/ng/. dist/site/api/ng/
          cp -r dist/compodoc/ng-bootstrap/. dist/site/api/ng-bootstrap/
          cp tools/pages/index.html dist/site/index.html
          touch dist/site/.nojekyll

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist/site

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
