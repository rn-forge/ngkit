name: Pages

on:
  push:
    branches:
      - main
    paths:
      - 'libs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Build Storybook
        run: pnpm exec nx build-storybook ng-bootstrap

      - name: Build Compodoc API docs
        run: |
          pnpm exec nx run ng:compodoc
          pnpm exec nx run ng-bootstrap:compodoc

      - name: Assemble site
        run: |
          mkdir -p dist/site/api/ng dist/site/api/ng-bootstrap
          cp -r dist/storybook/ng-bootstrap dist/site/storybook
          cp -r dist/compodoc/ng/. dist/site/api/ng/
          cp -r dist/compodoc/ng-bootstrap/. dist/site/api/ng-bootstrap/
          cp tools/pages/index.html dist/site/index.html
          touch dist/site/.nojekyll

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist/site

      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
